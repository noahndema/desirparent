<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — DésirParent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <style>
        .login-page {
            min-height: calc(100vh - 64px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            background: var(--white);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-md);
        }

        .login-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--prune);
            margin-bottom: 0.25rem;
        }

        .login-sub {
            color: var(--gray-500);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--gray-500);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-logo img {
            height: 52px;
            width: auto;
            border-radius: 12px;
        }

        @media (max-width: 480px) {
            .login-card { padding: 1.75rem; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="nav">
        <a href="/" class="nav-logo">
            <img src="/images/logo-transparent.png" alt="DésirParent">
            <span class="nav-logo-text">DésirParent</span>
        </a>
        <div class="nav-links">
            <a href="/inscription" class="nav-link cta nav-logged-out">Créer mon profil</a>
            <a href="/profil" class="nav-link nav-logged-in" style="display:none">Mon profil</a>
            <a href="#" class="nav-link logout nav-logged-in logout-btn" style="display:none">Déconnexion</a>
        </div>
    </nav>

    <main class="login-page">
        <div class="login-card">
            <div class="auth-logo"><img src="/images/logo-transparent.png" alt="DésirParent"></div>
            <h1 class="login-title">Connexion</h1>
            <p class="login-sub">Retrouvez votre profil DésirParent.</p>

            <div id="alert" class="alert"></div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="votre@email.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mot de passe</label>
                    <input type="password" id="password" class="form-input" placeholder="Votre mot de passe" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    Se connecter
                </button>
            </form>

            <div class="register-link">
                Pas encore de compte ? <a href="/inscription">Créer mon profil</a>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
    <script>
    async function handleLogin(e) {
        e.preventDefault();
        hideAlert('alert');

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            return showAlert('alert', 'Veuillez remplir tous les champs.');
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner"></span> Connexion...';

        try {
            await API.login({ email, password });
            window.location.href = '/decouvrir';
        } catch (err) {
            showAlert('alert', err.message);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Se connecter';
        }
    }

    // If already logged in, redirect
    document.addEventListener('DOMContentLoaded', async () => {
        const { loggedIn } = await checkAuth();
        if (loggedIn) window.location.href = '/decouvrir';
    });
    </script>
</body>
</html>
